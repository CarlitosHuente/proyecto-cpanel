{% extends "base.html" %}
{% block title %}Login - Huentelauquén{% endblock %}

{% block content %}
<div class="d-flex align-items-center justify-content-center" style="min-height: 80vh;">
    <div class="text-center">
        <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Logo" width="180" class="mb-4">
        <h2 class="text-danger mb-4">La calidad no se transa</h2>

        {% if error %}
            <div class="alert alert-danger mt-2">{{ error }}</div>
        {% endif %}

        <form method="POST" class="mb-4 text-start mt-3">
            <h5 class="text-white mb-3 text-center">Login Huente</h5>

            <div class="mb-3">
                <label class="form-label text-white">Correo</label>
                <input type="email" name="email" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label text-white">Contraseña</label>
                <input type="password" name="password" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-danger w-100">Entrar</button>
        </form>

    </div>
</div>
{% endblock %}
